# Tank Challenge Simulator 평지 제어 데이터셋 기반 파라미터
# source: 전차제어_데이터셋_구축_정지거리_최종수정본
# 좌표/yaw 해석은 기존 컨트롤러와 동일하게 유지한다.
yaw_axis: body_x

vehicle:
  # Simulator Q&A: Player 하단 몸체 bounding box (x,y,z) = (3.667, 1.582, 8.066) m
  body_width_m: 3.667
  body_height_m: 1.582
  body_length_m: 8.066
  turret_width_m: 3.297
  turret_height_m: 2.779
  turret_length_m: 5.891

planning:
  # 기존 TANK_HALF_WIDTH=2.0을 YAML 단일 출처로 이동. 실제 반폭 1.8335m + 보수 여유.
  half_width_m: 2.0
  half_length_m: 4.03
  safety_margin_m: 1.0
  command_latency_sec: 0.30
  base_static_inflate_m: 2.0
  base_dynamic_inflate_m: 4.5
  base_discovered_inflate_m: 2.0
  base_lidar_memory_inflate_m: 3.0
  speed_inflation_scale: 0.45
  max_speed_inflation_extra_m: 3.5
  emergency_front_base_m: 24.0
  emergency_front_min_m: 12.0
  emergency_front_max_m: 45.0
  turn_preparation_distance_m: 6.0

controller_speed_policy:
  enabled: true
  cruise_speed_mps: 4.6
  slow_turn_speed_mps: 2.4
  crawl_turn_speed_mps: 1.6
  crawl_pivot_speed_mps: 1.0
  min_forward_speed_mps: 0.7
  goal_approach_speed_mps: 0.9
  obstacle_slow_speed_mps: 1.0

dynamics_model:
  forward_speed_mps_per_weight: 13.6
  reverse_speed_mps_per_weight: 8.33
  yaw_rate_degps_per_ad_weight: 40.0
  yaw_rate_radps_per_ad_weight: 0.698
  recommended_local_target_distance: 8.0
  recommended_turn_ws_weight: 0.4
  recommended_crawl_pivot_ws_weight: 0.1
  recommended_crawl_turn_ws_weight: 0.2

steady_state_speed:
  0.1: 1.39
  0.2: 2.73
  0.3: 4.17
  0.4: 5.72
  0.5: 6.98
  0.6: 8.44
  0.7: 9.96
  0.8: 11.41
  0.9: 12.81
  1.0: 13.60

reverse_speed:
  0.1: 0.83
  0.2: 1.67
  0.3: 2.50
  0.4: 3.33
  0.5: 4.16
  0.6: 5.00
  0.7: 5.83
  0.8: 6.66
  0.9: 7.50
  1.0: 8.33

steady_state_yaw_rate:
  0.1: 4.0
  0.2: 8.0
  0.3: 12.0
  0.4: 16.0
  0.5: 20.0
  0.6: 24.0
  0.7: 28.0
  0.8: 32.0
  0.9: 36.0
  1.0: 40.0

stopping:
  nominal_distance: 2.0
  safety_distance: 3.0
  controller_goal_margin: 10.0
  # 속도 기반 정지거리 모델: d_stop = v*reaction_time + v^2/(2*decel) + safety_distance
  reaction_time_sec: 0.30
  decel_mps2: 3.0
  min_stop_distance_m: 1.0
  max_stop_distance_m: 12.0

turning_radii_examples:
  - w_ws: 1.0
    w_ad: 1.0
    radius: 19.47
  - w_ws: 0.5
    w_ad: 0.5
    radius: 19.97
  - w_ws: 0.3
    w_ad: 0.8
    radius: 7.05
  - w_ws: 0.1
    w_ad: 1.0
    radius: 2.00

rough_terrain_factors:
  # 현재 데이터는 평지 기준이다. 지형 roughness 기반 보정은 추후 terrain costmap과 연동한다.
  speed_reduction_ratio: 1.0
  yaw_rate_reduction_ratio: 1.0
  stopping_distance_multiplier: 1.0
