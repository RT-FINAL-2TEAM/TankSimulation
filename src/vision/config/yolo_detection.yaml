# YOLO detection configuration for Tank Challenge /detect endpoint.
# These values are intentionally kept outside code so RL/perception teams can tune them later.
model:
  # car/house가 추가된 best_final 모델을 사용한다.
  # engine을 사용할 경우 반드시 현재 best_final.pt에서 다시 export한 416 engine이어야 한다.
  default_filename: best_final.engine
  imgsz: 416
  iou: 0.70
  max_det: 20
  max_return: 5
  model_confidence: 0.10
  fallback_model_confidence: 0.05
  enable_low_conf_fallback: false
  enable_cache: true
  min_interval_sec: 0.12
  half_if_cuda: true
  warmup_runs: 2

tracking:
  # 1차 병합 범위: production /detect는 동기 방식 유지, 추론 함수만 model.track() 선택 가능.
  enabled: true
  tracker: bytetrack.yaml
  persist: true

classes:
  # 최종 detection public class는 아래 canonical class만 사용한다.
  # 새 모델 names 기준: {0: car, 1: person, 2: tank, 3: rock, 4: house}
  canonical:
    - car
    - person
    - tank
    - rock
    - house
    - tent
  fixed_ids:
    tank: 1
    rock: 2
    person: 3
    tent: 4
    car: 5
    house: 6
  aliases:
    blue: person
    red: person
    Tank: tank
    tank: tank
    person: person
    rock: rock
    tent: tent
    wall: wall
    car: car
    vehicle: car
    house: house
    building: house
  # car를 YOLO detection에서 제외하지 않는다.
  # 기존 기본값/코드에 car, wall ignore가 남아 있어도 이 빈 리스트가 config에서 override한다.
  ignored: []
  default_box_color: '#00FF00'
  colors:
    car: '#FF66CC'
    person: '#00FFFF'
    rock: '#FFA500'
    tank: '#FF0000'
    wall: '#00FF00'
    tent: '#FFFF00'
    house: '#AA66FF'
  default_confidence: 0.20
  confidence_thresholds:
    car: 0.20
    tank: 0.25
    person: 0.25
    rock: 0.20
    house: 0.20
  close_wall:
    confidence: 0.12
    area_ratio: 0.08
    min_height_ratio: 0.35

bbox_distance:
  # 보류: bbox 기반 거리 추정 알고리즘은 나중에 보조 metadata/fallback으로만 검토한다.
  # 이번 병합에서는 실제 position_map 계산에 사용하지 않는다.
  enabled: false
  publish_metadata: false

preprocess:
  shadow_filter_enabled: false
  shadow_sigma: 35.0
  shadow_strength: 0.75
  shadow_work_scale: 0.35
  shadow_max_side: 960
  clahe_enabled: false
  clahe_clip: 1.5

runtime:
  recognition_log: true
  recognition_log_cache: false
  recognition_log_empty: false
  timing_log: false
  debug_detections: false
