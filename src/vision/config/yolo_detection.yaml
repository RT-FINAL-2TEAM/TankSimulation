# YOLO detection configuration for Tank Challenge /detect endpoint.
# These values are intentionally kept outside code so RL/perception teams can tune them later.
model:
  default_filename: best_300.engine
  imgsz: 416
  iou: 0.70
  max_det: 12
  max_return: 5
  model_confidence: 0.5
  fallback_model_confidence: 0.5
  enable_low_conf_fallback: false
  enable_cache: true
  min_interval_sec: 0.05
  half_if_cuda: true
  warmup_runs: 3

tracking:
  # Production /detect uses predict() by default. Enable this only when trackId persistence is needed.
  enabled: false
  tracker: bytetrack.yaml
  persist: true

classes:
  # Final public detection classes returned to the simulator and fusion pipeline.
  canonical:
    - rock
    - person
    - tank
    - car
    - house
  fixed_ids:
    tank: 1
    rock: 2
    person: 3
    car: 4
    house: 5
  aliases:
    blue: person
    red: person
    Tank: tank
    tank: tank
    person: person
    rock: rock
    car: car
    Car: car
    house: house
    House: house
  ignored: []
  default_box_color: '#00FF00'
  colors:
    person: '#39FF88'
    rock: '#FFA500'
    tank: '#FF0000'
    car: '#FF8C00'
    house: '#B084FF'
  default_confidence: 0.5
  confidence_thresholds:
    tank: 0.5
    person: 0.5

bbox_distance:
  # 보류: bbox 기반 거리 추정 알고리즘은 나중에 보조 metadata/fallback으로만 검토한다.
  # 이번 병합에서는 실제 position_map 계산에 사용하지 않는다.
  enabled: false
  publish_metadata: false

preprocess:
  shadow_filter_enabled: false
  shadow_sigma: 35.0
  shadow_strength: 0.75
  shadow_work_scale: 0.35
  shadow_max_side: 960
  clahe_enabled: false
  clahe_clip: 1.5

runtime:
  recognition_log: false
  recognition_log_cache: false
  recognition_log_empty: false
  timing_log: false
  debug_detections: false
